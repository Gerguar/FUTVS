[build]
  publish = "web"
  command = ""
  # Skip deploy si el commit no toca archivos de web/ (lee Netlify automaticamente).
  # Asi los commits del cron de GitHub Actions que solo actualizan data/ no gastan
  # deploys de Netlify.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- web/"

[[headers]]
  for = "/predictions.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https: data:; connect-src 'self' https://dyeouwqtebrvioesrbcf.supabase.co; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests"

[[redirects]]
  from = "/ranking"
  to = "/ranking.html"
  status = 200

[[redirects]]
  from = "/ranking/"
  to = "/ranking.html"
  status = 200
