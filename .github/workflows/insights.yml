name: insights (cada 6h + manual)

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch: {}

jobs:
  insights:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generar insights.json e insights_semana.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.generate_insights

      - name: Commit insights
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/insights.json data/insights_semana.json || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh insights $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "no changes"
          fi
