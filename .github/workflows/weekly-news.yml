name: weekly-news

on:
  schedule:
    - cron: "0 8 * * 1"   # cada lunes a las 08:00 UTC
  workflow_dispatch: {}

concurrency:
  group: git-push
  cancel-in-progress: false

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch weekly football news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python src/fetch_news.py

      - name: Commit news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/data/insights_semana.json || true
          if ! git diff --cached --quiet; then
            git stash
            git pull --rebase origin main
            git stash pop
            git add web/data/insights_semana.json || true
            git commit -m "chore: refresh weekly news $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin main
          else
            echo "no changes in weekly news"
          fi
