name: deploy-hostinger

# Auto-deploy de web/ a Hostinger via FTP.
#
# Se dispara cuando:
#  - Push a main que toque archivos en web/
#  - Manual (workflow_dispatch)
#
# Asi los commits del cron (que solo cambian data/) NO disparan deploy,
# solo cambios reales del HTML/CSS/JS.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hostinger-ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync web/ a Hostinger via FTP
        id: ftp_primary
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web/
          # Ruta activa de la app Node.js dentro de la cuenta FTP.
          server-dir: ./domains/futversus.com/nodejs/
          protocol: ftp
          port: 21
          log-level: verbose
          timeout: 120000
          # Cambio el state-name para forzar resync. El default era
          # .ftp-deploy-sync-state.json y se quedo con la version vieja del
          # .htaccess (creia que estaba sincronizado cuando no). Con un nombre
          # nuevo, la action re-evalua todos los archivos desde cero.
          state-name: .ftp-deploy-sync-state-v2.json
          # No borra archivos extra en el servidor, solo sube los nuestros.
          dangerous-clean-slate: false
          # Excluye basura que no debe ir al hosting.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

      - name: Esperar antes del reintento
        if: steps.ftp_primary.outcome == 'failure'
        run: sleep 15

      - name: Reintentar sync web/ a Hostinger via FTP
        id: ftp_retry
        if: steps.ftp_primary.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./web/
          server-dir: ./domains/futversus.com/nodejs/
          protocol: ftp
          port: 21
          log-level: verbose
          timeout: 120000
          state-name: .ftp-deploy-sync-state-v2.json
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

      - name: Verificar resultado del FTP
        if: always()
        run: |
          if [[ "${{ steps.ftp_primary.outcome }}" != "success" && "${{ steps.ftp_retry.outcome }}" != "success" ]]; then
            echo "Los dos intentos de despliegue FTP fallaron."
            exit 1
          fi

      - name: Resumen
        run: |
          echo "Deploy completado a https://futversus.com/"
          echo "Archivos en web/ subidos a /domains/futversus.com/nodejs/."
