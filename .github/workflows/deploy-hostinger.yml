name: deploy-hostinger

# Auto-deploy de web/ a Hostinger via FTP.
#
# Se dispara cuando:
#  - Push a main que toque archivos en web/
#  - Manual (workflow_dispatch)
#
# Asi los commits del cron (que solo cambian data/) NO disparan deploy,
# solo cambios reales del HTML/CSS/JS.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hostinger-ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Instalar lftp
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Sincronizar web/ con la app activa de Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        # Hard ceiling: si pasa 6 min total, abortar y dejar que el siguiente
        # push reintente. Mejor que quedarse 30 min colgado (default 6h).
        timeout-minutes: 6
        shell: bash
        run: |
          # 5 intentos con timeouts cortos. Si Hostinger no responde, falla
          # rapido y reintentamos. Mejor que quedarse esperando 120s × reintentos
          # internos × attempts (que hacia colgadas de 30+ min).
          for attempt in 1 2 3 4 5; do
            echo "Intento FTP ${attempt}/5"
            # timeout 90s wrap externo: si lftp se cuelga, lo matamos.
            if timeout 90 lftp -u "${FTP_USERNAME},${FTP_PASSWORD}" -p 21 "${FTP_HOST}" -e "
              set ftp:ssl-allow no;
              set ftp:list-options -a;
              set net:timeout 25;
              set net:max-retries 2;
              set net:reconnect-interval-base 3;
              set cmd:fail-exit yes;
              mirror --reverse --only-newer --verbose --parallel=1 \
                --exclude-glob .git* \
                --exclude-glob node_modules/ \
                --exclude-glob .DS_Store \
                ./web/ /domains/futversus.com/nodejs/;
              bye
            "; then
              echo "Sincronizacion FTP completada."
              exit 0
            fi

            echo "Intento ${attempt} fallo. Esperando antes de reintentar..."
            if [[ "${attempt}" -lt 5 ]]; then
              sleep $((attempt * 10))
            fi
          done

          echo "La sincronizacion FTP fallo despues de cinco intentos."
          exit 1

      - name: Resumen
        run: |
          echo "Deploy completado a https://futversus.com/"
          echo "Archivos en web/ subidos a /domains/futversus.com/nodejs/."
