name: deploy-hostinger

# Auto-deploy de web/ a Hostinger via FTP.
#
# Se dispara cuando:
#  - Push a main que toque archivos en web/
#  - Manual (workflow_dispatch)
#
# Asi los commits del cron (que solo cambian data/) NO disparan deploy,
# solo cambios reales del HTML/CSS/JS.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: hostinger-ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Instalar lftp
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Sincronizar web/ con la app activa de Hostinger
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "Intento FTP ${attempt}/3"
            if lftp -u "${FTP_USERNAME},${FTP_PASSWORD}" -p 21 "${FTP_HOST}" -e "
              set ftp:ssl-allow no;
              set ftp:list-options -a;
              set net:timeout 120;
              set net:max-retries 5;
              set net:reconnect-interval-base 5;
              mirror --reverse --only-newer --verbose --parallel=1 \
                --exclude-glob .git* \
                --exclude-glob node_modules/ \
                --exclude-glob .DS_Store \
                ./web/ /domains/futversus.com/nodejs/;
              bye
            "; then
              echo "Sincronizacion FTP completada."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep $((attempt * 15))
            fi
          done

          echo "La sincronizacion FTP fallo despues de tres intentos."
          exit 1

      - name: Resumen
        run: |
          echo "Deploy completado a https://futversus.com/"
          echo "Archivos en web/ subidos a /domains/futversus.com/nodejs/."
