name: evaluate

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Fecha inicio backtest (YYYY-MM-DD)"
        default: "2024-01-01"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Ingest historico
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: python -m src.data_ingest --backfill --since ${{ github.event.inputs.since }}

      - name: Train baseline
        run: python -m src.train

      - name: Backtest
        run: |
          python -m src.backtest || echo "[backtest] no existe src.backtest, usando metricas de holdout"
          ls data/

      - name: Mostrar metricas
        run: |
          echo "=== METRICAS HOLDOUT ==="
          if [ -f data/backtest_report.json ]; then
            cat data/backtest_report.json
          else
            echo "backtest_report.json no generado, ver logs de Train baseline"
          fi

      - name: Guardar reporte
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: backtest report $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          else
            echo "no changes"
          fi
