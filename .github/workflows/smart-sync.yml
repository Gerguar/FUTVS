name: smart-sync (resultados + Mundial en vivo)

# Estrategia:
# - Cron cada 30 min.
# - Job 'check' (~15s, sin instalar deps Python): activa el sync si hay partidos
#   vencidos hace 120 min, o si un partido del Mundial ya llego al kickoff o
#   figura en curso. Durante el Mundial esto refresca estado/resultado cada 30 min.
# - Job 'sync' (~3 min): solo corre si 'check' encontro candidatos. Hace
#   data_ingest + supabase_sync para refrescar el parquet y propagar los
#   FINISHED a Supabase.
# - Si en este intento football-data.org aun no marco FINISHED (caso comun
#   con batches de La Liga), el siguiente cron en 30 min vuelve a intentar.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needs_sync: ${{ steps.check.outputs.needs_sync }}
      pending_count: ${{ steps.check.outputs.pending_count }}
    steps:
      - id: check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          NOW=$(date -u +%Y-%m-%dT%H:%M:%S)
          CUTOFF=$(date -u -d "-120 minutes" +%Y-%m-%dT%H:%M:%S)
          URL_OVERDUE="${SUPABASE_URL}/rest/v1/partidos?select=id&estado=eq.programado&fecha=lt.${CUTOFF}"
          URL_WC_DUE="${SUPABASE_URL}/rest/v1/partidos?select=id&liga_id=eq.7&temporada=eq.2026&estado=eq.programado&fecha=lte.${NOW}"
          URL_WC_LIVE="${SUPABASE_URL}/rest/v1/partidos?select=id&liga_id=eq.7&temporada=eq.2026&estado=eq.en_curso"

          count_url() {
            curl -sI "$1" \
                          -H "apikey: $SUPABASE_SERVICE_KEY" \
                          -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
                          -H "Prefer: count=exact" \
                          -H "Range: 0-0" \
              | awk 'tolower($0) ~ /^content-range:/ {split($0, parts, "/"); gsub("\r", "", parts[2]); print parts[2]}'
          }

          OVERDUE=$(count_url "$URL_OVERDUE")
          WC_DUE=$(count_url "$URL_WC_DUE")
          WC_LIVE=$(count_url "$URL_WC_LIVE")
          OVERDUE=${OVERDUE:-0}
          WC_DUE=${WC_DUE:-0}
          WC_LIVE=${WC_LIVE:-0}
          COUNT=$((OVERDUE + WC_DUE + WC_LIVE))

          echo "Vencidos +120m: $OVERDUE | Mundial desde kickoff: $WC_DUE | Mundial en curso: $WC_LIVE"
          if [ "$COUNT" -gt 0 ]; then
            echo "needs_sync=true" >> "$GITHUB_OUTPUT"
            echo "pending_count=$COUNT" >> "$GITHUB_OUTPUT"
          else
            echo "needs_sync=false" >> "$GITHUB_OUTPUT"
            echo "pending_count=0" >> "$GITHUB_OUTPUT"
          fi

  sync:
    needs: check
    if: needs.check.outputs.needs_sync == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Ingest fixtures + resultados frescos (football-data.org)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python -m src.data_ingest --days-ahead 14 --skip-couk

      - name: Sync a Supabase (crea/actualiza partidos + cierra finalizados)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.supabase_sync --horizon 14

      - name: Ingest stats de partidos recien finalizados (API-Football)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python -m src.ingest_match_stats || echo "[stats] fallo no critico, sigue el sync"

      - name: Sync fixture Mundial 2026 (selecciones FIFA, liga_id=7)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python -m src.ingest_wc2026

      - name: Sync ranking Elo selecciones (eloratings.net)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.ingest_elo_selecciones || echo "[elo] fallo no critico"

      - name: Integrar lesiones desde insights (Claude)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.integrate_lesiones_mundial || echo "[lesiones] fallo no critico"

      - name: Re-predict Mundial (despues de updates de partidos + Elo + Lesiones)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.predict_mundial || echo "[predict-mundial] fallo no critico"

      - name: Commit parquet actualizado (si hubo cambios)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches.parquet || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: smart-sync $(date -u +%Y-%m-%dT%H:%M:%SZ) (${{ needs.check.outputs.pending_count }} pendientes)"
            git push
          else
            echo "no changes"
          fi

      - name: Resumen
        run: |
          echo "Pendientes detectados antes del sync: ${{ needs.check.outputs.pending_count }}"
          echo "(Si quedan en 'programado' tras este sync, football-data.org todavia"
          echo " no marco FINISHED. Proximo intento en 30 min.)"
