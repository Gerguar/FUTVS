name: backfill (manual)

on:
  workflow_dispatch:
    inputs:
      since:
        description: "Fecha desde (YYYY-MM-DD)"
        required: true
        default: "2022-08-01"

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: python -m src.data_ingest --backfill --since ${{ inputs.since }}
      - run: python -m src.train
      - run: python -m src.predict --horizon 14 --snapshot 24h --out data/predictions.json
      - env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m src.supabase_writer --predictions data/predictions.json
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/
          git commit -m "chore: backfill since ${{ inputs.since }}" || echo "nothing"
          git push || true
