name: player-stats (manual)

# Ingest de estadisticas de jugadores desde Understat (via soccerdata).
# SIN cron mientras verificamos que Understat permita scraping desde GH Actions.
# fbref bloquea las IPs de datacenter — Understat suele ser mas permisivo.
#
# Si Understat tambien bloquea, vamos a evaluar otras opciones.

on:
  workflow_dispatch:
    inputs:
      season:
        description: "Temporada (ej: 2024-25 o 2024)"
        required: true
        default: "2024-25"
      temporada_label:
        description: "Etiqueta en Supabase (default: 'YYYY/YY')"
        required: false
        default: ""

jobs:
  fbref:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Sincronizar stats de jugadores desde fbref
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          SEASON="${{ inputs.season || '2024-25' }}"
          LABEL="${{ inputs.temporada_label }}"
          if [ -z "$LABEL" ]; then
            python -m src.ingest_fbref_stats --season "$SEASON"
          else
            python -m src.ingest_fbref_stats --season "$SEASON" --temporada-label "$LABEL"
          fi
